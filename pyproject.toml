[tool.black]
line-length = 120
target-version = ["py312"]
exclude = '''
/(
    migrations
  | node_modules
  | venv
  | env
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip = ["migrations", "node_modules", "venv", "env"]

[tool.coverage.run]
source = ["."]
omit = [
    "__init__.py",
    "*/migrations/*",
    "SORT/*",
    "*/admin.py",
    "*/tests/*",
    "home/management/*",
    "survey/management/*",
]

[tool.coverage.report]
format = "markdown"
skip_empty = true
sort = "Cover"
